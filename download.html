    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Chuyển Hướng An Toàn... | MDVH18</title>
    <style>
        body { background: #0f0c29; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(215, 155, 187, 0.2); max-width: 400px; width: 90%; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #f78f90; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #timer { font-size: 3em; color: #d79bbb; font-weight: bold; margin: 10px 0; }
        .btn-manual { display: none; background: #f78f90; color: white; text-decoration: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-manual:hover { background: #fff; color: #f78f90; box-shadow: 0 0 15px #f78f90; }
        
        .toast-custom { position: fixed; bottom: 30px; right: 30px; background: #1a1131; color: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10000; font-family: "Segoe UI", sans-serif; max-width: 320px; animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        #pixeldrain-toast a:hover { background: #fff !important; color: #f78f90 !important; }
        #terabox-toast a:hover { background: #fff !important; color: #54b5f5 !important; }
    </style>
</head>
<body>
    <div class="box" id="main-box">
        <div class="loader"></div>
        <h3>HỆ THỐNG ĐANG KIỂM TRA</h3>
        <p>Vui lòng chờ trong giây lát để lấy liên kết tải game an toàn.</p>
        <div id="timer">4</div>
        <a id="manual-link" class="btn-manual" href="#">NHẤN VÀO ĐÂY NẾU KHÔNG TỰ CHUYỂN</a>
    </div>

    <script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let encoded = urlParams.get('url');
        const timerEl = document.getElementById('timer');
        const manualBtn = document.getElementById('manual-link');
        const boxEl = document.getElementById('main-box');
        
        let targetUrl = "";

        if (encoded) {
            try {
                // 1. Fix lỗi Base64: Chuyển khoảng trắng (do trình duyệt tự convert từ dấu +) về dạng chuẩn
                // và xóa mọi ký tự xuống dòng/cách dư thừa
                encoded = encoded.trim().replace(/\s/g, '+');
                
                // 2. Giải mã
                targetUrl = atob(encoded);
                
                // 3. Dọn dẹp link sau giải mã: Xóa các ký tự điều khiển và khoảng trắng vô hình
                targetUrl = targetUrl.replace(/[\x00-\x1F\x7F-\x9F]/g, "").trim();

                // 4. Logic thay đổi domain nội bộ
                if (targetUrl.includes('mdvh18.github.io/mdvh18/')) {
                    targetUrl = targetUrl.replace('mdvh18.github.io/mdvh18/', 'mdvh18.github.io/');
                }

                // 5. Kiểm tra domain để hiển thị thông báo hỗ trợ
                if (targetUrl.includes('pixeldrain.com')) {
                    showPixeldrainFAQ();
                } 
                else if (targetUrl.includes('terabox') || targetUrl.includes('1024tera') || targetUrl.includes('teraboxapp')) {
                    showTeraboxFAQ();
                }
                else if (targetUrl.includes('buzzheavier.com')) {
                    showBuzzheavierNotice();
                }

                // 6. Đếm ngược và chuyển hướng
                let timeLeft = 4;
                const countdown = setInterval(() => {
                    timeLeft--;
                    if (timerEl) timerEl.innerText = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        
                        // Cập nhật link cho nút thủ công trước
                        if (manualBtn) {
                            manualBtn.href = targetUrl;
                            manualBtn.style.display = 'inline-block';
                        }
                        
                        // Thực hiện chuyển hướng sạch (replace giúp không bị lặp trang khi quay lại)
                        window.location.replace(targetUrl);
                    }
                }, 1000);

            } catch (e) {
                console.error("Decode error:", e);
                boxEl.innerHTML = "<h3>LỖI GIẢI MÃ</h3><p>Dữ liệu link không đúng định dạng hoặc bị hỏng.</p>";
            }
        } else {
            boxEl.innerHTML = "<h3>LỖI ĐƯỜNG DẪN</h3><p>Không tìm thấy liên kết yêu cầu.</p>";
        }

        // --- Các hàm hiển thị thông báo ---

        function showPixeldrainFAQ() {
            createToast('🚀', 'Phát hiện Pixeldrain!', 'Link này giới hạn 6GB/ngày. Xem FAQ để biết mẹo tải không giới hạn.', '#f78f90');
        }

        function showTeraboxFAQ() {
            createToast('☁️', 'Phát hiện Terabox!', 'Nên đăng nhập hoặc dùng App để tránh bị giới hạn tốc độ tải.', '#54b5f5');
        }

        function showBuzzheavierNotice() {
            createToast('⚡', 'Phát hiện Buzzheavier!', 'Dịch vụ lưu trữ tốc độ cao. Nếu lỗi, hãy thử tắt VPN.', '#ffeb3b');
        }

        function createToast(icon, title, desc, color) {
            const toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.style.cssText = `border: 2px solid ${color}; padding: 15px; background: #1a1131; border-radius: 10px; position: fixed; bottom: 20px; right: 20px; z-index: 9999; max-width: 300px; transition: 0.5s;`;
            toast.innerHTML = `
                <div style="display:flex; align-items:center; margin-bottom:12px;">
                    <span style="font-size:24px; margin-right:10px;">${icon}</span>
                    <strong style="color:${color}; font-size:16px;">${title}</strong>
                </div>
                <p style="font-size:14px; line-height:1.5; margin-bottom:15px; color:#e0e0e0;">${desc}</p>
                <div style="text-align:right;">
                    <a href="https://mdvh18.blogspot.com/p/faq.html" target="_blank" style="background:${color}; color:#1a1131; padding:5px 12px; border-radius:15px; text-decoration:none; font-weight:bold; font-size:12px;">XEM FAQ</a>
                </div>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                setTimeout(() => toast.remove(), 800);
            }, 8000);
        }
    })();
</script>
</body>
</html>
