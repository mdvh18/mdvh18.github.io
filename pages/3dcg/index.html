---
layout: pages
title: "3DCG"
---

{% assign target = "3dcg" %}
{% for post in site.posts %}
    {% assign genres = post.genre | downcase %}
    {% if genres contains target %}
        <a href="{{ post.url }}">
            <img src="{{ post.image }}" alt="{{ post.title }}">
            <span>{{ post.title }}</span>
        </a>
    {% endif %}
{% endfor %}
